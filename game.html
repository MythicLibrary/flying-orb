<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flying Orb: The Journey</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background-color: #050507; color: white; font-family: 'Segoe UI', sans-serif; user-select: none; transition: background-color 2s ease; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        .menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 10;
        }
        .hidden { display: none !important; }
        h1 { font-size: 3rem; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; margin-bottom: 10px; }
        h2 { margin: 5px 0; }
        h3 { margin: 5px 0; color: #aaa; }
        button {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white; border: none; padding: 15px 40px; font-size: 1.2rem;
            margin: 10px; border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        #scoreDisplay { color: #ffd700; font-size: 3rem; }
        #highScoreDisplay { color: #fff; font-size: 1.5rem; }
        #newRecordText {
            color: #00ff88; text-shadow: 0 0 15px #00ff88; font-size: 2rem;
            animation: pulse 1s infinite; margin-top: 0; margin-bottom: 15px;
        }
        #godModeIndicator {
            position: absolute; bottom: 20px; right: 20px; color: #fff; 
            font-weight: bold; text-shadow: 0 0 10px #fff; font-size: 1.5rem;
            animation: pulse 1.5s infinite; z-index: 5;
        }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.4; transform: scale(0.95); } }
        input[type=range] { width: 200px; margin-bottom: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="godModeIndicator" class="hidden">HYPER GOD MODE ACTIVE</div>

    <div id="mainMenu" class="menu-overlay">
        <h1>Flying Orb</h1>
        <button id="btnPlay">Start Mission</button>
        <button id="btnSettings">Settings</button>
    </div>

    <div id="settingsMenu" class="menu-overlay hidden">
        <h1>Settings</h1>
        <label for="volumeSlider" style="font-size: 1.5rem; margin-bottom: 10px;">Master Volume</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
        <button id="btnSettingsBack">Back</button>
    </div>

    <div id="gameOverMenu" class="menu-overlay hidden">
        <h1 style="color: #ff4757;">ORB SHATTERED</h1>
        <h2>Distance: <span id="scoreDisplay">0</span></h2>
        <div id="newRecordText" class="hidden">NEW RECORD!</div>
        <h3>Best: <span id="highScoreDisplay">0</span></h3>
        <button id="btnRestart">Restart</button>
        <button id="btnHome">Main Menu</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const TILE = 40; 
    
    let audioCtx, masterVolume = 0.5;
    let gameState = 'MENU', frameCount = 0;
    const keys = { w: false, a: false, s: false, d: false, ' ': false };
    
    // Load High Score from Local Storage
    let savedHighScore = localStorage.getItem('flyingOrbHighScore') || 0;
    
    window.addEventListener('keydown', (e) => { 
        if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = true; 
        
        // --- GOD MODE LOGIC: ACTIVATION ---
        if (e.code === 'NumpadAdd' || e.key === '+') {
            player.godMode = true;
            document.getElementById('godModeIndicator').classList.remove('hidden');
        }
        if (e.key === 'Escape') {
            player.godMode = false;
            document.getElementById('godModeIndicator').classList.add('hidden');
        }
    });

    window.addEventListener('keyup', (e) => { if(e.key.toLowerCase() in keys) keys[e.key.toLowerCase()] = false; });

    document.getElementById('volumeSlider').addEventListener('input', (e) => { masterVolume = parseFloat(e.target.value); });

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSfx(freq, type = 'sine', vol = 0.1, duration = 0.1) {
        if(!audioCtx || masterVolume === 0) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(masterVolume * vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    let player, blocks = [], hazards = [], items = [], particles = [], trail = [];
    let cameraX = 0, maxXReached = 0, nextSpawnX = 0, lastOrbChunk = 0;

    function resetGame() {
        player = { 
            x: 400, y: Math.floor(window.innerHeight/(2*TILE))*TILE, 
            w: TILE, h: TILE, vx: 0, vy: 0, 
            gravity: 0.28, thrust: 0.6, friction: 0.94,
            godMode: false, boosting: 0, recovery: 0 
        };
        blocks = []; hazards = []; items = []; particles = []; trail = [];
        cameraX = 0; maxXReached = 0; frameCount = 0; lastOrbChunk = 0;
        document.getElementById('godModeIndicator').classList.add('hidden');
        
        blocks.push({ x: -2000, y: -TILE, w: 1000000, h: TILE, type: 'ceiling' }); 
        blocks.push({ x: 0, y: Math.floor(window.innerHeight/TILE - 2)*TILE, w: TILE*12, h: TILE*5 });
        nextSpawnX = TILE * 14;
    }

    function getSawSize(dist) {
        let r = Math.random() * 100;
        if (dist < 7500) { if (r < 22.5) return 1; if (r < 72.5) return 2; if (r < 95) return 3; return 4; } 
        return 4;
    }

    function getSpikeType(dist) {
        let r = Math.random() * 100;
        if (dist < 5000) { if (r < 40) return 'flat'; if (r < 80) return 'normal'; return 'giant'; }
        return 'giant';
    }

    function generateWorld() {
        while (nextSpawnX < cameraX + window.innerWidth + 2500) {
            let currentDist = Math.floor(nextSpawnX / TILE);
            let chunk = Math.floor(currentDist / 100);
            if (chunk > lastOrbChunk) {
                lastOrbChunk = chunk;
                if (Math.random() < 0.15) items.push({ x: nextSpawnX + TILE*2, y: window.innerHeight / 2, r: 15, type: 'boost' });
            }

            nextSpawnX += Math.floor(Math.random() * 4 + 2) * TILE;
            let platWTiles = Math.floor(Math.random() * 3 + 2);
            let platW = platWTiles * TILE;
            let platH = Math.floor(Math.random() * 5 + 2) * TILE;
            let isTop = Math.random() > 0.5;
            let yPos = isTop ? 0 : Math.floor(window.innerHeight / TILE) * TILE - platH;
            blocks.push({ x: nextSpawnX, y: yPos, w: platW, h: platH });

            if (Math.random() > 0.4) {
                if (currentDist > 2500 && Math.random() > 0.5) {
                    let s = getSawSize(currentDist);
                    let sawDim = s * TILE;
                    let gapMin = isTop ? platH : 0;
                    let gapMax = isTop ? window.innerHeight : yPos;
                    let spawnRange = (gapMax - gapMin) - sawDim;
                    if (spawnRange > 0) {
                        let midY = Math.floor((Math.random() * spawnRange + gapMin) / TILE) * TILE;
                        hazards.push({ x: nextSpawnX + (platW/2 - sawDim/2), y: midY, w: sawDim, h: sawDim, type: 'saw' });
                    }
                } else {
                    let primaryType = getSpikeType(currentDist);
                    if (primaryType === 'giant' && platWTiles >= 2) {
                        let spikeW = TILE * 2, spikeH = TILE * 2;
                        let spikeY = isTop ? platH : yPos - spikeH;
                        if (platWTiles === 4) {
                            hazards.push({ x: nextSpawnX, y: spikeY, w: spikeW, h: spikeH, type: 'spike', inv: isTop });
                            hazards.push({ x: nextSpawnX + spikeW, y: spikeY, w: spikeW, h: spikeH, type: 'spike', inv: isTop });
                        } else {
                            hazards.push({ x: nextSpawnX + (platW - spikeW) / 2, y: spikeY, w: spikeW, h: spikeH, type: 'spike', inv: isTop });
                        }
                    } else {
                        for (let i = 0; i < platWTiles; i++) {
                            let spikeH = (getSpikeType(currentDist) === 'flat') ? TILE * 0.5 : TILE;
                            let spikeY = isTop ? platH : yPos - spikeH;
                            hazards.push({ x: nextSpawnX + (i * TILE), y: spikeY, w: TILE, h: spikeH, type: 'spike', inv: isTop });
                        }
                    }
                }
            }
            nextSpawnX += platW;
        }
    }

    function checkCollision(axis) {
        if (player.boosting > 0 || player.recovery > 0) return; 
        for (let b of blocks) {
            if (player.x < b.x + b.w && player.x + player.w > b.x && player.y < b.y + b.h && player.y + player.h > b.y) {
                if (axis === 'x') { if (player.vx > 0) player.x = b.x - player.w; else if (player.vx < 0) player.x = b.x + b.w; player.vx = 0; } 
                else { if (player.vy > 0) player.y = b.y - player.h; else if (player.vy < 0) player.y = b.y + b.h; player.vy = 0; }
            }
        }
    }

    function updateBackground() {
        let dist = Math.floor(maxXReached), cycle = dist % 12000, bgColor = '#050507';
        if (dist >= 2000) {
            if (cycle < 2000 && dist >= 12000) bgColor = '#050518';
            else if (cycle < 6000) bgColor = '#180505';
            else if (cycle < 12000) bgColor = '#051805';
        }
        document.body.style.backgroundColor = bgColor;
    }

    function update() {
        if (gameState === 'GAMEOVER') {
            particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.alpha -= 0.003; });
            return;
        }
        if (gameState !== 'PLAYING') return;

        if (player.boosting > 0) {
            player.boosting--;
            player.vx = (250 * TILE) / 60; player.vy = 0;
            player.y += ((window.innerHeight / 2 - TILE / 2) - player.y) * 0.1;
            if (player.boosting === 0) {
                player.vx = 0; player.vy = 0;
                player.recovery = 1; 
                playSfx(200, 'sine', 0.2, 0.5);
            }
        } else if (player.recovery > 0) {
            player.recovery--;
            player.vx = 0; player.vy = 0;
        } else {
            // --- GOD MODE LOGIC: SPEED MULTIPLIER ---
            let m = player.godMode ? 5 : 1;
            
            if (keys.w || keys[' ']) { 
                player.vy -= player.thrust * m; 
                if (frameCount % 12 === 0) playSfx(400, 'sine', 0.05); 
            }
            if (keys.s) player.vy += player.thrust * m;
            if (keys.a) player.vx -= player.thrust * m;
            if (keys.d) player.vx += player.thrust * m;
            player.vy += player.gravity; player.vx *= player.friction; player.vy *= player.friction;
        }

        player.x += player.vx; checkCollision('x');
        player.y += player.vy; checkCollision('y');

        // --- GOD MODE LOGIC: TRAIL LENGTH ---
        let maxTrail = (player.godMode || player.boosting > 0) ? 20 : 10;
        trail.push({ x: player.x, y: player.y });
        while (trail.length > maxTrail) trail.shift(); 

        for (let i = items.length - 1; i >= 0; i--) {
            let dx = (player.x + TILE/2) - items[i].x, dy = (player.y + TILE/2) - items[i].y;
            if (Math.sqrt(dx*dx + dy*dy) < items[i].r + TILE/2) {
                player.boosting = 60; playSfx(600, 'square', 0.1, 0.5); items.splice(i, 1);
            }
        }

        cameraX = (player.boosting > 0) ? player.x - window.innerWidth / 4 : Math.max(cameraX, player.x - 10 * TILE);
        if (player.x / TILE > maxXReached) maxXReached = player.x / TILE;
        
        generateWorld();
        updateBackground();

        // --- GOD MODE LOGIC: HAZARD IMMUNITY ---
        // If player.godMode is TRUE, this entire collision check is skipped
        if (!player.godMode && player.boosting === 0 && player.recovery === 0) {
            let hb = { x: player.x+8, y: player.y+8, w: TILE-16, h: TILE-16 };
            for (let h of hazards) if (hb.x < h.x + h.w && hb.x + hb.w > h.x && hb.y < h.y + h.h && hb.y + hb.h > h.y) die();
            if (player.y > window.innerHeight) die();
        }
        frameCount++;
    }

    function die() {
        if (gameState === 'GAMEOVER') return;
        playSfx(150, 'sawtooth', 0.2, 0.4);
        gameState = 'GAMEOVER'; trail = [];
        
        // High Score Logic
        let finalScore = Math.floor(maxXReached);
        let isNewRecord = false;
        
        if (finalScore > savedHighScore) {
            savedHighScore = finalScore;
            localStorage.setItem('flyingOrbHighScore', savedHighScore);
            isNewRecord = true;
        }

        document.getElementById('scoreDisplay').innerText = finalScore;
        document.getElementById('highScoreDisplay').innerText = savedHighScore;
        
        if (isNewRecord && finalScore > 0) {
            document.getElementById('newRecordText').classList.remove('hidden');
        } else {
            document.getElementById('newRecordText').classList.add('hidden');
        }

        document.getElementById('gameOverMenu').classList.remove('hidden');
        for (let i = 0; i < 30; i++) particles.push({ x: player.x + TILE/2, y: player.y + TILE/2, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, alpha: 1, r: Math.random()*4+2 });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (gameState === 'MENU') return;

        ctx.save(); ctx.translate(-cameraX, 0);
        items.forEach(item => { 
            ctx.fillStyle = 'white'; ctx.shadowBlur = 15; ctx.shadowColor = 'white'; 
            ctx.beginPath(); ctx.arc(item.x, item.y, item.r + Math.sin(frameCount*0.1)*3, 0, Math.PI*2); ctx.fill(); 
        });
        ctx.shadowBlur = 0;

        trail.forEach((pos, i) => {
            let ratio = i / trail.length; 
            // --- GOD MODE LOGIC: TRAIL COLOR ---
            ctx.fillStyle = (player.godMode || player.boosting > 0 || player.recovery > 0) ? `rgba(255, 255, 255, ${ratio})` : `rgba(0, 210, 255, ${ratio})`;
            ctx.beginPath(); ctx.arc(pos.x + TILE/2, pos.y + TILE/2, (TILE/2) * ratio, 0, Math.PI*2); ctx.fill();
        });

        ctx.fillStyle = '#2a5ba0';
        for (let b of blocks) if (b.type !== 'ceiling') ctx.fillRect(b.x, b.y, b.w, b.h);

        for (let h of hazards) {
            if (h.type === 'spike') {
                ctx.fillStyle = '#ff4757'; ctx.beginPath();
                if(h.inv) { ctx.moveTo(h.x, h.y); ctx.lineTo(h.x + h.w, h.y); ctx.lineTo(h.x + h.w/2, h.y + h.h); }
                else { ctx.moveTo(h.x, h.y + h.h); ctx.lineTo(h.x + h.w, h.y + h.h); ctx.lineTo(h.x + h.w/2, h.y); }
                ctx.fill();
            } else {
                ctx.save(); ctx.translate(h.x + h.w/2, h.y + h.h/2); ctx.rotate(frameCount * 0.1);
                ctx.fillStyle = '#7f8c8d'; ctx.beginPath(); ctx.arc(0, 0, h.w/2, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#ecf0f1'; ctx.lineWidth = h.w > TILE*2 ? 4 : 2; ctx.setLineDash([TILE/4, TILE/4]); ctx.stroke(); ctx.restore();
            }
        }

        if (gameState === 'PLAYING') {
            // --- GOD MODE LOGIC: ORB COLOR AND GLOW ---
            ctx.fillStyle = (player.godMode || player.boosting > 0 || player.recovery > 0) ? '#ffffff' : '#00d2ff';
            ctx.shadowBlur = (player.boosting > 0 || player.recovery > 0) ? 50 : 15;
            ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(player.x + TILE/2, player.y + TILE/2, TILE/2 - 2, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
        if (gameState === 'PLAYING') { ctx.shadowBlur = 0; ctx.fillStyle = 'white'; ctx.font = 'bold 24px monospace'; ctx.fillText(`DIST: ${Math.floor(maxXReached)}`, 20, 40); }
    }

    function loop() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; update(); draw(); requestAnimationFrame(loop); }
    
    // UI Event Listeners
    document.getElementById('btnPlay').onclick = () => { initAudio(); resetGame(); gameState = 'PLAYING'; document.getElementById('mainMenu').classList.add('hidden'); };
    document.getElementById('btnSettings').onclick = () => { document.getElementById('mainMenu').classList.add('hidden'); document.getElementById('settingsMenu').classList.remove('hidden'); };
    document.getElementById('btnSettingsBack').onclick = () => { document.getElementById('settingsMenu').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); };
    document.getElementById('btnRestart').onclick = () => { resetGame(); gameState = 'PLAYING'; document.getElementById('gameOverMenu').classList.add('hidden'); document.getElementById('newRecordText').classList.add('hidden'); };
    document.getElementById('btnHome').onclick = () => { gameState = 'MENU'; document.getElementById('gameOverMenu').classList.add('hidden'); document.getElementById('newRecordText').classList.add('hidden'); document.getElementById('mainMenu').classList.remove('hidden'); };
    
    loop();
</script>
</body>
</html>
